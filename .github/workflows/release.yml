name: Release

on:
  push:
    tags:
      - "v*"

env:
  HOMEBREW_TAP_REPOSITORY: AlucPro/homebrew-tap
  HOMEBREW_FORMULA_PATH: Formula/motd-tool.rb

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      package_version: ${{ steps.package_meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: package_meta
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Check
        run: pnpm check

      - name: Pack
        run: pnpm pack

      - name: Update Formula
        run: node ./scripts/prepare-release.mjs

      - name: Publish to npm
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            motd-tool-*.tgz

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Pack
        run: pnpm pack

      - name: Update Formula
        run: node ./scripts/prepare-release.mjs

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Copy formula into tap
        run: |
          mkdir -p "homebrew-tap/Formula"
          cp "${{ env.HOMEBREW_FORMULA_PATH }}" "homebrew-tap/${{ env.HOMEBREW_FORMULA_PATH }}"

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.HOMEBREW_FORMULA_PATH }}"
          if git diff --cached --quiet; then
            echo "No Homebrew formula changes to commit."
            exit 0
          fi
          git commit -m "motd-tool ${{ needs.publish.outputs.package_version }}"
          git push origin HEAD
